name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
      - develop
      - "release/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo-deny
        run: cargo deny check

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install desktop dependencies
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Typecheck desktop
        run: cd desktop && pnpm exec tsc --noEmit

      - name: Build desktop frontend
        run: cd desktop && pnpm build

      - name: Build Tauri desktop (no bundle)
        run: cd desktop && pnpm tauri build --no-bundle
        env:
          CI: true

  desktop-linux-bundle:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: [rust, desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install desktop dependencies
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Build Tauri Linux bundle
        run: cd desktop && pnpm tauri build
        env:
          CI: true

      - name: Upload Linux bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install desktop dependencies
        run: cd desktop && pnpm install --frozen-lockfile

      - name: Install markdownlint-cli2
        run: pnpm add -g markdownlint-cli2

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  verify-release-tag:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Read Cargo.toml version
        id: cargo
        run: |
          version=$(grep -E '^version\s*=\s*"[^"]+"' Cargo.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Cargo.toml
        run: |
          if [ "${{ steps.tag.outputs.version }}" != "${{ steps.cargo.outputs.version }}" ]; then
            echo "Tag version ${{ steps.tag.outputs.version }} does not match Cargo.toml version ${{ steps.cargo.outputs.version }}"
            exit 1
          fi
          echo "Tag and Cargo.toml versions match: ${{ steps.tag.outputs.version }}"

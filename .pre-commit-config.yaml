repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(desktop/pnpm-lock\.yaml|Cargo\.lock)$'
      - id: end-of-file-fixer
        exclude: '^(desktop/pnpm-lock\.yaml|Cargo\.lock|.*\.epub)$'
      - id: check-yaml
      - id: check-json
        exclude: 'tsconfig.*\.json$'
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Scan for secrets (gitleaks)
        args: ["protect", "--verbose", "--redact"]

  - repo: local
    hooks:
      - id: detect-api-keys
        name: Detect API keys and tokens
        entry: bash scripts/detect-api-keys.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: cargo-fmt
        name: Rust fmt
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        files: '\.rs$'

      - id: cargo-clippy
        name: Rust clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false
        files: '\.rs$'
        require_serial: true

      - id: cargo-test
        name: Rust tests
        entry: cargo test --workspace
        language: system
        pass_filenames: false
        files: '\.rs$'
        require_serial: true

      - id: pnpm-install
        name: Install desktop dependencies
        entry: bash -c 'cd desktop && pnpm install --frozen-lockfile'
        language: system
        pass_filenames: false
        files: 'desktop/(package\.json|pnpm-lock\.yaml)$'
        require_serial: true

      - id: pnpm-typecheck
        name: Desktop typecheck
        entry: bash -c 'cd desktop && pnpm exec tsc --noEmit'
        language: system
        pass_filenames: false
        files: 'desktop/.*\.(ts|tsx)$'
        require_serial: true

      - id: cargo-deny
        name: Cargo deny
        entry: cargo deny check
        language: system
        pass_filenames: false
        files: 'Cargo\.(toml|lock)|deny\.toml$'
        require_serial: true

      - id: markdownlint
        name: Markdown lint
        entry: npx markdownlint-cli2 README.md CHANGELOG.md AGENTS.md docs/**/*.md
        language: system
        pass_filenames: false
        files: '\.md$'

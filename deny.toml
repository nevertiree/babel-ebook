[graph]
targets = [{ triple = "x86_64-unknown-linux-gnu" }]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "warn"
# Many transitive dependencies (Tauri/GTK/kuchiki) carry unmaintained advisories
# that are outside the project's direct control, so only vulnerabilities,
# unsound workspace crates, and yanked crates are checked for now.
unmaintained = "none"
unsound = "workspace"
ignore = [
    # docx-rs 0.4.20 pins quick-xml 0.36.2; the vulnerabilities below affect XML
    # attribute parsing and namespace handling, which docx-rs uses internally.
    # Upgrading quick-xml requires a docx-rs release (or fork) that supports
    # quick-xml >= 0.41.0. This is tracked as technical debt and will be
    # revisited when upstream is updated.
    { id = "RUSTSEC-2026-0194", reason = "docx-rs pins quick-xml 0.36.2; no upstream release with quick-xml >= 0.41.0" },
    { id = "RUSTSEC-2026-0195", reason = "docx-rs pins quick-xml 0.36.2; no upstream release with quick-xml >= 0.41.0" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    # MPL-2.0 is a weak/file-level copyleft license used by transitive HTML/CSS
    # parsing crates (e.g., cssparser, selectors). It is explicitly allowed here
    # as an exception to the otherwise permissive license policy.
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

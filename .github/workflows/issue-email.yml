name: Issue Email Notification

on:
  issues:
    types: [opened, reopened, closed]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send issue notification email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[BabelEbook] Issue ${{ github.event.action }} - ${{ github.event.issue.title }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          html_body: |
            <h2>BabelEbook Issue 通知</h2>
            <p><strong>操作：</strong>${{ github.event.action }}</p>
            <p><strong>标题：</strong>${{ github.event.issue.title }}</p>
            <p><strong>作者：</strong>${{ github.event.issue.user.login }}</p>
            <p><strong>链接：</strong><a href="${{ github.event.issue.html_url }}">查看 Issue</a></p>
            <hr>
            <p>${{ github.event.issue.body }}</p>
          convert_markdown: false
